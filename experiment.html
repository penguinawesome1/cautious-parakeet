<!DOCTYPE html>
<html>
<head>
    <title>Buttons!</title>
    <link rel="shortcut icon" href="https://img.icons8.com/?size=512&id=5l29cBQpcOxR&format=png">
    <style>
        .btn1 {
            display: inline-block;
            outline: 0;
            cursor: pointer;
            border-radius: 6px;
            border: 2px solid #ff4742;
            color: #ff4742;
            background: 0 0;
            padding: 8px;
            box-shadow: rgba(0, 0, 0, 0.07) 0px 2px 4px 0px, rgba(0, 0, 0, 0.05) 0px 1px 1.5px 0px;
            font-weight: 800;
            font-size: 16px;
            height: 42px;
        }
        
        .btn1:hover{
            background-color: #ff4742;
            color: #fff;
        }
        
        .btn2 {
            display: inline-block;
            outline: none;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            border-radius: 500px;
            transition-property: background-color,border-color,color,box-shadow,filter;
            transition-duration: .3s;
            border: 1px solid transparent;
            letter-spacing: 2px;
            min-width: 80px;
            text-transform: uppercase;
            white-space: normal;
            font-weight: 700;
            text-align: center;
            padding: 10px 10px;
            color: #fff;
            background-color: #1ED760;
            height: 48px;
        }
    
        .btn2:hover{
            transform: scale(1.04);
            background-color: #21e065;
        }    
    </style>
</head>
<body>
  	<a href="https://rb.gy/ooydbb">
      	<p><button class="btn1">Sell Your Soul</button></p></a>
    <a href="https://rb.gy/el6ozx">
    	<p><button class="btn2">Save Your Soul</button></p></a>
</body>
</html>
