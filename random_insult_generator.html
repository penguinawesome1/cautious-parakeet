<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Insult Generator By Owen</title>
  <link rel="shortcut icon" href="https://pngfre.com/wp-content/uploads/trollface-png-from-pngfre-15-300x255.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        display: flex;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f0f0;
      }
      
      #clock {
        font-size: 3em;
      }

      .btn1 {
        display: inline-block;
        outline: 0;
        border: 0;
        cursor: pointer;
        background-color: #4299e1;
        border-radius: 4px;
        padding: 8px 16px;
        font-size: 16px;
        border-bottom: 4px solid #2b6cb0;
        font-weight: 700;
        color: white;
        line-height: 26px;
      }

      .center {
        margin: 0;
        position: absolute;
        top: 50%;
        left: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
      }
    </style>
</head>
<body>
  <div id="clock"></div>
  <script>
    function updateClock() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const seconds = now.getSeconds().toString().padStart(2, '0');
      const clockElement = document.getElementById('clock');
      clockElement.textContent = `${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function randomize(arr) {
      let data = [...arr];
      let chosenItems = [];
      
      function getRandomValue() {
        if (data.length === 0) {
          data = chosenItems;
          chosenItems = [];
        }
        const index = Math.floor(Math.random() * data.length);
        const choice = data.splice(index, 1)[0];
        chosenItems.push(choice);
        return choice;
      }
      return {
        randomItem: getRandomValue
      }
    }
    
    const dummyData = [ 1,2,3,4,5 ];
    const randomizeData = randomize(dummyData);
    for (let i = 0; i< 10; i++) {
      console.log(randomizeData.randomItem())
    }
  </script>
  <p>
    <br>
    <button class="btn1 center">Accept Insult</button>
    <br>
  </p>
</body>
</html>
